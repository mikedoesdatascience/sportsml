trainer:
  _target_: pytorch_lightning.Trainer
  min_epochs: 10
  logger: True
  callbacks:
    - _target_: pytorch_lightning.callbacks.ModelCheckpoint
      monitor: val_rmse
    - _target_: pytorch_lightning.callbacks.early_stopping.EarlyStopping
      monitor: val_rmse
      patience: 20

model:
  _target_: sportsml.models.mlp.MLP
  in_feats: 114
  dims:
    - 100
    - 100
    - 1

dm:
  _target_: sportsml.nba.data.datamodule.NBAGameDataModule
  splits:
    - 0.8
    - 0.1
    - 0.1

seed: null