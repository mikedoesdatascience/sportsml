image: gitpod/workspace-python-3.11

tasks:
  - name: Setup dev environment
    before: |
      alias ltr='ls -lhtr'
      echo "alias ltr='ls -lhtr'" >> ~/.bashrc
      python -m pip install -U uv
      python -m uv pip install --system -r ./python/requirements.cpu.lock
      python -m uv pip install --system bump2version black build twine
      python -m uv pip install --system --no-deps -e ./python