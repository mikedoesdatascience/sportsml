[bumpversion]
current_version = 0.0.8-dev0
commit = true
parse = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)(\-(?P<release>[a-z]+)(?P<build>\d+))?
serialize = 
	{major}.{minor}.{patch}-{release}{build}
	{major}.{minor}.{patch}

[bumpversion:file:python/sportsml/__init__.py]

[bumpversion:file:python/pyproject.toml]

