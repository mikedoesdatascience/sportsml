stages:
  - publish
  - build

pypi-publish:
  stage: publish
  image: python:3.11-slim
  only:
    - tags
  needs: []
  script:
    - python -m pip install hatch
    - python -m hatch build
    - python -m hatch publish -u __token__ -a $PYPI_TOKEN dist/*

docker-build-push:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  only:
    - tags
  needs: ["pypi-publish"]
  before_script:
    - apk add make python3 py-pip
    - docker info
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - make build-prod
    - make push